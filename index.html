<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>洲明●智显-2026华东AI共进会●江苏站嘉宾分享倒计时</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1018;
      --panel: rgba(255, 255, 255, 0.08);
      --panel-strong: rgba(255, 255, 255, 0.15);
      --text: #f7fbff;
      --muted: #aeb9c9;
      --line: rgba(255, 255, 255, 0.18);
      --accent: #20d39b;
      --accent-2: #58b8ff;
      --warn: #ffd166;
      --danger: #ff6170;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at 14% 14%, rgba(32, 211, 155, 0.22), transparent 31rem),
        radial-gradient(circle at 86% 12%, rgba(88, 184, 255, 0.2), transparent 28rem),
        linear-gradient(145deg, #0b1018 0%, #171d28 54%, #101817 100%);
      display: grid;
      place-items: center;
      padding: 22px;
    }

    main {
      width: min(1220px, 100%);
    }

    .stage {
      min-height: min(800px, calc(100vh - 44px));
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.11), rgba(255, 255, 255, 0.055));
      box-shadow: 0 26px 90px rgba(0, 0, 0, 0.36);
      overflow: hidden;
      backdrop-filter: blur(22px);
      display: grid;
      grid-template-rows: 1fr auto;
    }

    .display {
      padding: clamp(28px, 5vw, 66px);
      display: grid;
      align-content: center;
      gap: clamp(20px, 3.4vw, 38px);
      text-align: center;
    }

    .eyebrow {
      color: var(--accent);
      font-size: clamp(15px, 1.9vw, 24px);
      font-weight: 800;
    }

    h1 {
      max-width: 1080px;
      margin: 0 auto;
      font-size: clamp(28px, 5.2vw, 68px);
      line-height: 1.1;
      letter-spacing: 0;
    }

    .meta {
      min-height: 34px;
      color: var(--muted);
      font-size: clamp(17px, 2.2vw, 28px);
      line-height: 1.35;
    }

    .status {
      color: var(--muted);
      font-size: clamp(18px, 2.3vw, 30px);
      min-height: 40px;
    }

    .time {
      font-variant-numeric: tabular-nums;
      font-size: clamp(100px, 22vw, 272px);
      line-height: 0.86;
      font-weight: 900;
      letter-spacing: 0;
      text-shadow: 0 16px 50px rgba(0, 0, 0, 0.34);
    }

    .progress {
      width: min(900px, 100%);
      height: 15px;
      margin: 0 auto;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.25);
      overflow: hidden;
    }

    .progress span {
      display: block;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transform-origin: left center;
      transform: scaleX(1);
      transition: transform 180ms linear, background 200ms ease;
    }

    .controls {
      border-top: 1px solid var(--line);
      padding: clamp(16px, 2.6vw, 28px);
      background: rgba(0, 0, 0, 0.18);
      display: grid;
      gap: 16px;
    }

    .setup {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    input {
      width: 100%;
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      padding: 0 14px;
      font: inherit;
      outline: none;
    }

    input::placeholder {
      color: rgba(174, 185, 201, 0.72);
    }

    input:focus {
      border-color: rgba(32, 211, 155, 0.82);
      box-shadow: 0 0 0 3px rgba(32, 211, 155, 0.16);
    }

    .preset-grid {
      display: grid;
      grid-template-columns: repeat(9, minmax(0, 1fr));
      gap: 10px;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 12px;
    }

    button {
      min-height: 52px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      font: inherit;
      font-size: clamp(14px, 1.35vw, 17px);
      cursor: pointer;
      transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
      white-space: nowrap;
    }

    button:hover {
      transform: translateY(-1px);
      background: var(--panel-strong);
      border-color: rgba(255, 255, 255, 0.34);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      transform: none;
    }

    button:focus-visible {
      outline: 3px solid rgba(32, 211, 155, 0.45);
      outline-offset: 2px;
    }

    .preset.active {
      border-color: rgba(32, 211, 155, 0.9);
      background: rgba(32, 211, 155, 0.18);
      color: #dcfff5;
      font-weight: 800;
    }

    .primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-color: transparent;
      color: #05110d;
      font-weight: 900;
    }

    .secondary {
      background: rgba(255, 255, 255, 0.11);
    }

    .warning .time,
    .warning .status {
      color: var(--warn);
    }

    .warning .progress span {
      background: var(--warn);
    }

    .done .time,
    .done .status {
      color: var(--danger);
    }

    .done .progress span {
      background: var(--danger);
    }

    .presentation .controls {
      display: none;
    }

    .presentation .stage {
      grid-template-rows: 1fr;
    }

    .presentation-hint {
      position: fixed;
      right: 14px;
      bottom: 12px;
      color: rgba(255, 255, 255, 0.48);
      font-size: 13px;
      pointer-events: none;
    }

    @media (max-width: 980px) {
      .preset-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .actions {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 660px) {
      body {
        padding: 10px;
      }

      .stage {
        min-height: calc(100vh - 20px);
      }

      .display {
        padding: 24px 14px;
      }

      .setup,
      .preset-grid,
      .actions {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="stage" id="stage" aria-label="嘉宾分享倒计时">
      <div class="display">
        <div>
          <div class="eyebrow">嘉宾分享倒计时</div>
          <h1>洲明●智显-2026华东AI共进会●江苏站嘉宾分享倒计时</h1>
        </div>

        <div class="meta" id="meta">可填写嘉宾与分享主题</div>
        <div class="time" id="time" aria-live="polite">30:00</div>

        <div class="progress" aria-hidden="true">
          <span id="progressBar"></span>
        </div>

        <div class="status" id="status">请选择时长后点击开始</div>
      </div>

      <div class="controls" id="controls">
        <div class="setup">
          <input id="speakerInput" type="text" maxlength="18" placeholder="嘉宾姓名，可选">
          <input id="topicInput" type="text" maxlength="36" placeholder="分享主题，可选">
        </div>

        <div class="preset-grid" aria-label="倒计时时长">
          <button class="preset active" type="button" data-seconds="1800">30分钟</button>
          <button class="preset" type="button" data-seconds="1500">25分钟</button>
          <button class="preset" type="button" data-seconds="1200">20分钟</button>
          <button class="preset" type="button" data-seconds="900">15分钟</button>
          <button class="preset" type="button" data-seconds="600">10分钟</button>
          <button class="preset" type="button" data-seconds="300">5分钟</button>
          <button class="preset" type="button" data-seconds="180">3分钟</button>
          <button class="preset" type="button" data-seconds="60">1分钟</button>
          <button class="preset" type="button" data-seconds="30">30秒</button>
        </div>

        <div class="actions">
          <button class="primary" type="button" id="startButton" title="空格">开始</button>
          <button class="secondary" type="button" id="pauseButton" title="空格" disabled>暂停</button>
          <button class="secondary" type="button" id="resetButton" title="R">重置</button>
          <button class="secondary" type="button" id="soundButton" title="S">声音：关</button>
          <button class="secondary" type="button" id="hideButton" title="H">隐藏控制</button>
          <button class="secondary" type="button" id="fullscreenButton" title="F">全屏</button>
        </div>
      </div>
    </section>
  </main>
  <div class="presentation-hint" id="hint" hidden>H 显示控制</div>

  <script>
    const stage = document.querySelector("#stage");
    const metaEl = document.querySelector("#meta");
    const timeEl = document.querySelector("#time");
    const statusEl = document.querySelector("#status");
    const progressBar = document.querySelector("#progressBar");
    const startButton = document.querySelector("#startButton");
    const pauseButton = document.querySelector("#pauseButton");
    const resetButton = document.querySelector("#resetButton");
    const soundButton = document.querySelector("#soundButton");
    const hideButton = document.querySelector("#hideButton");
    const fullscreenButton = document.querySelector("#fullscreenButton");
    const speakerInput = document.querySelector("#speakerInput");
    const topicInput = document.querySelector("#topicInput");
    const hint = document.querySelector("#hint");
    const presetButtons = Array.from(document.querySelectorAll(".preset"));

    const storage = {
      seconds: "speakerCountdownSeconds",
      sound: "speakerCountdownSound",
      speaker: "speakerCountdownSpeaker",
      topic: "speakerCountdownTopic"
    };

    let selectedSeconds = Number(localStorage.getItem(storage.seconds)) || 1800;
    let remainingMs = selectedSeconds * 1000;
    let endAt = 0;
    let timerId = null;
    let overrunId = null;
    let isRunning = false;
    let hasStarted = false;
    let soundEnabled = localStorage.getItem(storage.sound) === "true";
    let audioContext = null;
    let lastWholeSecond = Math.ceil(remainingMs / 1000);
    const playedAlerts = new Set();

    speakerInput.value = localStorage.getItem(storage.speaker) || "";
    topicInput.value = localStorage.getItem(storage.topic) || "";

    applySavedPreset();
    updateSoundButton();
    render();

    presetButtons.forEach((button) => {
      button.addEventListener("click", () => {
        selectedSeconds = Number(button.dataset.seconds);
        localStorage.setItem(storage.seconds, String(selectedSeconds));
        resetTimer("已选择 " + button.textContent);
      });
    });

    startButton.addEventListener("click", startTimer);
    pauseButton.addEventListener("click", pauseTimer);
    resetButton.addEventListener("click", () => resetTimer("已重置"));
    soundButton.addEventListener("click", toggleSound);
    hideButton.addEventListener("click", togglePresentation);
    fullscreenButton.addEventListener("click", toggleFullscreen);
    speakerInput.addEventListener("input", saveMeta);
    topicInput.addEventListener("input", saveMeta);

    document.addEventListener("keydown", (event) => {
      if (event.target instanceof HTMLInputElement) {
        return;
      }

      const key = event.key.toLowerCase();
      if (event.code === "Space") {
        event.preventDefault();
        isRunning ? pauseTimer() : startTimer();
      } else if (key === "r") {
        resetTimer("已重置");
      } else if (key === "f") {
        toggleFullscreen();
      } else if (key === "h") {
        togglePresentation();
      } else if (key === "s") {
        toggleSound();
      }
    });

    document.addEventListener("fullscreenchange", () => {
      fullscreenButton.textContent = document.fullscreenElement ? "退出全屏" : "全屏";
    });

    function startTimer() {
      if (remainingMs <= 0) {
        remainingMs = selectedSeconds * 1000;
      }

      primeAudio();
      isRunning = true;
      hasStarted = true;
      endAt = Date.now() + remainingMs;
      lastWholeSecond = Math.ceil(remainingMs / 1000);
      stopOverrun();
      startButton.textContent = "继续";
      startButton.disabled = true;
      pauseButton.disabled = false;
      playedAlerts.clear();
      stage.classList.remove("done");
      statusEl.textContent = "倒计时进行中";

      clearInterval(timerId);
      tick();
      timerId = setInterval(tick, 200);
    }

    function pauseTimer() {
      if (!isRunning) {
        return;
      }

      remainingMs = Math.max(0, endAt - Date.now());
      stopTimer({ resetLabel: false });
      statusEl.textContent = "已暂停";
      render();
    }

    function resetTimer(message) {
      remainingMs = selectedSeconds * 1000;
      hasStarted = false;
      playedAlerts.clear();
      stopOverrun();
      stopTimer({ resetLabel: true });
      stage.classList.remove("done");
      setActivePreset();
      render(message);
    }

    function tick() {
      remainingMs = endAt - Date.now();
      const wholeSecond = Math.max(0, Math.ceil(remainingMs / 1000));

      if (wholeSecond !== lastWholeSecond) {
        lastWholeSecond = wholeSecond;
        maybePlayAlert(wholeSecond);
      }

      if (remainingMs <= 0) {
        stopTimer({ resetLabel: true });
        remainingMs = 0;
        stage.classList.add("done");
        playPattern([660, 820, 980]);
        startOverrun();
      }

      render();
    }

    function stopTimer(options = {}) {
      clearInterval(timerId);
      timerId = null;
      isRunning = false;
      startButton.disabled = false;
      pauseButton.disabled = true;

      if (options.resetLabel || !hasStarted) {
        startButton.textContent = "开始";
      }
    }

    function startOverrun() {
      clearInterval(overrunId);
      overrunId = setInterval(render, 1000);
    }

    function stopOverrun() {
      clearInterval(overrunId);
      overrunId = null;
    }

    function render(message) {
      const safeRemainingMs = Math.max(0, remainingMs);
      const safeRemainingSeconds = Math.ceil(safeRemainingMs / 1000);
      const progress = selectedSeconds > 0 ? safeRemainingMs / (selectedSeconds * 1000) : 0;
      const isOver = remainingMs <= 0 && hasStarted;
      const elapsedOverSeconds = isOver && endAt ? Math.floor((Date.now() - endAt) / 1000) : 0;

      timeEl.textContent = isOver ? `+${formatClock(elapsedOverSeconds)}` : formatClock(safeRemainingSeconds);
      progressBar.style.transform = `scaleX(${Math.max(0, Math.min(1, progress))})`;
      stage.classList.toggle("warning", !isOver && safeRemainingSeconds > 0 && safeRemainingSeconds <= 60);
      stage.classList.toggle("done", isOver);
      renderMeta();

      if (message) {
        statusEl.textContent = message;
      } else if (isOver) {
        statusEl.textContent = "时间到，请结束分享";
      } else if (!isRunning && safeRemainingSeconds > 0) {
        statusEl.textContent = `当前时长 ${formatDuration(selectedSeconds)}`;
      }
    }

    function renderMeta() {
      const speaker = speakerInput.value.trim();
      const topic = topicInput.value.trim();

      if (speaker && topic) {
        metaEl.textContent = `${speaker}｜${topic}`;
      } else if (speaker) {
        metaEl.textContent = speaker;
      } else if (topic) {
        metaEl.textContent = topic;
      } else {
        metaEl.textContent = "可填写嘉宾与分享主题";
      }
    }

    function saveMeta() {
      localStorage.setItem(storage.speaker, speakerInput.value);
      localStorage.setItem(storage.topic, topicInput.value);
      renderMeta();
    }

    function setActivePreset() {
      presetButtons.forEach((button) => {
        button.classList.toggle("active", Number(button.dataset.seconds) === selectedSeconds);
      });
    }

    function applySavedPreset() {
      const hasPreset = presetButtons.some((button) => Number(button.dataset.seconds) === selectedSeconds);
      if (!hasPreset) {
        selectedSeconds = 1800;
      }

      remainingMs = selectedSeconds * 1000;
      lastWholeSecond = selectedSeconds;
      setActivePreset();
    }

    function toggleSound() {
      soundEnabled = !soundEnabled;
      localStorage.setItem(storage.sound, String(soundEnabled));
      updateSoundButton();
      if (soundEnabled) {
        primeAudio();
        playPattern([720]);
      }
    }

    function updateSoundButton() {
      soundButton.textContent = soundEnabled ? "声音：开" : "声音：关";
    }

    function maybePlayAlert(wholeSecond) {
      if (wholeSecond === 60 || wholeSecond === 10) {
        playOnce(String(wholeSecond), wholeSecond === 60 ? [620, 620] : [780, 780, 780]);
      }
    }

    function playOnce(key, tones) {
      if (playedAlerts.has(key)) {
        return;
      }

      playedAlerts.add(key);
      playPattern(tones);
    }

    function primeAudio() {
      if (!soundEnabled || audioContext) {
        return;
      }

      audioContext = new (window.AudioContext || window.webkitAudioContext)();
    }

    function playPattern(tones) {
      if (!soundEnabled) {
        return;
      }

      primeAudio();
      if (!audioContext) {
        return;
      }

      const start = audioContext.currentTime;
      tones.forEach((frequency, index) => {
        const oscillator = audioContext.createOscillator();
        const gain = audioContext.createGain();
        oscillator.frequency.value = frequency;
        oscillator.type = "sine";
        gain.gain.setValueAtTime(0.0001, start + index * 0.18);
        gain.gain.exponentialRampToValueAtTime(0.18, start + index * 0.18 + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, start + index * 0.18 + 0.12);
        oscillator.connect(gain);
        gain.connect(audioContext.destination);
        oscillator.start(start + index * 0.18);
        oscillator.stop(start + index * 0.18 + 0.13);
      });
    }

    function togglePresentation() {
      document.body.classList.toggle("presentation");
      const isPresentation = document.body.classList.contains("presentation");
      hideButton.textContent = isPresentation ? "显示控制" : "隐藏控制";
      hint.hidden = !isPresentation;
    }

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
        fullscreenButton.textContent = "退出全屏";
      } else {
        document.exitFullscreen();
        fullscreenButton.textContent = "全屏";
      }
    }

    function formatDuration(totalSeconds) {
      if (totalSeconds < 60) {
        return `${totalSeconds}秒`;
      }

      return `${Math.floor(totalSeconds / 60)}分钟`;
    }

    function formatClock(totalSeconds) {
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return `${pad(minutes)}:${pad(seconds)}`;
    }

    function pad(value) {
      return String(value).padStart(2, "0");
    }
  </script>
</body>
</html>
